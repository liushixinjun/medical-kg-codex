  source_scope_aliases:
    - 瓣膜
    - 主动脉瓣
    - 二尖瓣
    - 三尖瓣
    - 肺动脉瓣
    - TAVR
    - TAVI
    - TEER
  inclusion_priority:
    P0: 教材骨架来源，固定纳入《内科学（第10版）》
    P1: 指南、专家共识、临床路径，优先用于诊断、治疗、手术/介入、禁忌和随访证据
    P2: 护理宣教、患者教育、边缘相关资料，只能补随访/宣教，不作为核心推荐等级证据
  exclusion_rules:
    - 名称含“非瓣膜性心房颤动”且主题不是瓣膜病者，不作为瓣膜病核心指南
    - 单纯感染性心内膜炎资料只在人工瓣膜心内膜炎或瓣膜手术并发症场景引用

