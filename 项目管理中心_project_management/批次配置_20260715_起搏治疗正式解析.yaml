source_policy:
  source_scope_aliases:
    - 起搏
    - 起搏器
    - 心脏起搏
    - 永久起搏
    - 临时起搏
    - ICD
    - CRT
    - 房室传导阻滞
    - 传导阻滞
    - 窦房结
    - 缓慢性心律失常
  inclusion_priority:
    P0: 教材骨架来源，固定纳入《内科学（第10版）》心律失常、传导阻滞和起搏相关章节
    P1: 起搏器、ICD、CRT、缓慢性心律失常、传导阻滞相关指南/专家共识/临床路径
    P2: 心衰、心肌病、冠心病、瓣膜病等交叉资料中明确涉及ICD/CRT/起搏适应证的段落，仅作为交叉证据引用
  exclusion_rules:
    - 单纯快速性心律失常资料不得整体纳入，只有明确涉及临时起搏、ICD、CRT或起搏器处理时才引用
    - 单纯心衰资料不得整体纳入，只有明确涉及CRT或ICD适应证、禁忌证、随访时才引用
    - 单纯术后护理资料只能补随访和患者教育，不作为核心推荐等级证据

