  inclusion_priority:
    P0: 教材骨架来源，固定纳入《内科学（第10版）》
    P1: 指南、专家共识、临床路径，优先用于诊断、分型、危险分层、靶向治疗、介入/手术、禁忌和随访证据
    P2: 肺栓塞、先心病、左心疾病等交叉资料，仅在肺动脉高压直接相关场景引用
  exclusion_rules:
    - 单纯急性肺栓塞资料不得整体作为肺动脉高压核心指南，只能用于 CTEPH 或鉴别诊断相关证据
    - 单纯先天性心脏病资料只有明确涉及肺动脉高压时才纳入
    - 单纯呼吸系统疾病资料只有明确涉及肺高压时才纳入

