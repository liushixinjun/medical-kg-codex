  </aside>

    <div class="ex-tabs">
      <div class="ex-tab active" data-view="disease" onclick="switchView('disease')">疾病视角</div>
      <div class="ex-tab" data-view="graph" onclick="switchView('graph')">关系视角</div>

  </main>
  <aside class="ex-right" id="detail-panel"><div class="ex-side-empty">点击疾病、实体或图谱节点后<br>这里显示属性、关系和证据信息</div></aside>

<script>
var CURRENT_DISEASE=null,CURRENT_VIEW='disease',GRAPH=null,ALL_ENTITIES=[];
var COLORS = DIM_COLORS_ARR;
loadData(function(){renderNav('explore');buildDiseaseTree();renderCurrent();
  // 读取 URL code 参数，有则选中对应疾病，无则选第一个
  var urlCode = new URLSearchParams(window.location.search).get('code');
  var targetCode = (urlCode && KG_DATA.diseases[urlCode]) ? urlCode : getDefaultDiseaseCode();
  if (targetCode) selectDisease(targetCode);
  // 异步加载实体索引
  buildEntityIndexAsync();
});
function buildDiseaseTree(){
  var ds=KG_DATA.diseases,groups={};
  Object.keys(ds).forEach(function(code){var info=ds[code].info,g=parseParentCode(info.parent).group;if(!groups[g])groups[g]=[];groups[g].push({code:code,name:info.name,cov:getCoverage(code)});});
  /* 已解析PDF的大类优先展示 */
  var parsedFirst=['冠心病','心肌病','心力衰竭'];
  var allGroups=Object.keys(groups);
  var sorted=parsedFirst.filter(function(g){return groups[g]}).concat(allGroups.filter(function(g){return parsedFirst.indexOf(g)===-1}).sort());
  var html='';
  sorted.forEach(function(g){
    var list=groups[g],ic=GROUP_ICONS[g]||'📁';
    /* 每大类下疾病按百分比高到低排序 */
    list.sort(function(a,b){return b.cov-a.cov});
    var avgCov=list.length?Math.round(list.reduce(function(s,d){return s+d.cov},0)/list.length):0;
    var avgCls=avgCov>=80?'cov-full':avgCov>=60?'cov-good':avgCov>=40?'cov-mid':'cov-low';
    html+='<div class="ex-group open"><div class="ex-group-head" onclick="toggleGroup(this)"><span class="arr">▶</span><span>'+ic+'</span><span>'+g+'</span><span class="count">'+list.length+'</span><span class="cov '+avgCls+'">'+avgCov+'%</span></div><div class="ex-group-items">';
    list.forEach(function(d){
      html+='<div class="ex-disease" data-code="'+d.code+'" onclick="selectDisease(\''+d.code+'\')"><span class="name">'+d.name+'</span><span class="cov '+covClass(d.cov)+'">'+Math.round(d.cov)+'%</span></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('disease-tree').innerHTML=html;
}
function toggleGroup(el){el.parentElement.classList.toggle('open')}
document.getElementById('disease-search').addEventListener('input',function(e){var q=e.target.value.toLowerCase();document.querySelectorAll('.ex-group').forEach(function(g){var visible=false;g.querySelectorAll('.ex-disease').forEach(function(d){var s=(d.textContent+d.dataset.code).toLowerCase(),show=!q||s.indexOf(q)!==-1;d.style.display=show?'flex':'none';if(show)visible=true;});g.style.display=visible?'block':'none';if(q&&visible)g.classList.add('open');});});
function selectDisease(code){
  // 先确保完整数据已加载
  loadDiseaseData(code, function(d) {
    if (!d) return;
    CURRENT_DISEASE = code;
    document.querySelectorAll('.ex-disease').forEach(function(el){el.classList.toggle('active',el.dataset.code===code)});
    renderCurrent();
    // 实体视角：同步更新疾病筛选器
    if(CURRENT_VIEW==='entity'){
      var sel=document.getElementById('entity-disease');
      if(sel){sel.value=code;filterEntities();}
    }
    showDiseaseSummary(code);
  });
}
function switchView(view){CURRENT_VIEW=view;document.querySelectorAll('.ex-tab').forEach(function(t){t.classList.toggle('active',t.dataset.view===view)});renderCurrent();}
function renderCurrent(){if(CURRENT_VIEW==='entity'){renderEntityView();return;}if(!CURRENT_DISEASE){document.getElementById('workspace').innerHTML='<div class="ex-empty">请先从左侧选择一种疾病</div>';return;}if(CURRENT_VIEW==='disease')renderDiseaseView(CURRENT_DISEASE);else renderGraphView(CURRENT_DISEASE);}
function renderDiseaseView(code){
  var d=KG_DATA.diseases[code],info=d.info,cv=getCoverage(code);
  var h='';

  // 疾病头部信息
  h+='<div class="ex-head"><h1>'+info.name+'</h1>';
  h+='<div class="ex-meta"><span class="ex-code">'+info.code+'</span>';
  if(info.name_en) h+=' · '+info.name_en;
  h+=' · 完整率 <b style="color:var(--accent)">'+Math.round(cv)+'%</b>';
  h+=' · 证据 <b style="color:var(--accent)">'+(d.evidence_count||0)+'</b> 条';
  h+='</div></div>';

  // 按临床逻辑分组展示
  var groups = [
    {
      name: '临床表现', icon: '🩺',
      dims: ['Symptom','Sign'],
      desc: '患者主诉和医生观察到的异常'
    },
    {
      name: '诊断检查', icon: '🔬',
      dims: ['Exam','LabTest'],
      desc: '辅助诊断的客观检查和化验'
    },
    {
      name: '治疗方案', icon: '💊',
      dims: ['TreatmentPlan','Medication','Procedure'],
      desc: '治疗策略、药物和手术操作'
    },
    {
      name: '预后与随访', icon: '📋',
      dims: ['Prognosis','FollowUp','Complication'],
      desc: '疾病转归、并发症和随访计划'
    },
    {
      name: '病因与机制', icon: '🧬',
      dims: ['Etiology','Pathophysiology','Epidemiology'],
      desc: '疾病发生的原因、病理机制和流行病学'
    },
    {
      name: '风险与诊断', icon: '⚠️',
      dims: ['RiskFactor','RiskStratification','DiagnosisCriteria','DifferentialDiagnosis'],
      desc: '危险因素、风险分层和鉴别诊断'
    },
    {
      name: '证据链与指南', icon: '📚',
      dims: ['Evidence','Guideline','ThresholdRule','ExamIndicator'],
      desc: '循证来源、临床指南、阈值规则和检查指标'
    }
  ];

  groups.forEach(function(grp) {
    // 检查该组是否有数据
    var hasData = grp.dims.some(function(k) {
      return d.dimensions[k] && d.dimensions[k].length > 0;
    });
    if (!hasData) return;

    h+='<div class="ex-clinical-group">';
    h+='<div class="ex-clinical-title"><span class="icon">'+grp.icon+'</span>'+grp.name+'<span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:8px">'+grp.desc+'</span></div>';
    h+='<div class="ex-clinical-grid">';

    grp.dims.forEach(function(k) {
      var it = d.dimensions[k] || [];
      if (it.length === 0) return;
      var cls = it.length ? 'ok' : 'zz';
      h+='<div class="ex-card"><div class="ex-card-head">';
      h+='<span class="ex-card-title">'+DIM_NAMES[k]+'</span>';
      h+='<span class="ex-card-count '+cls+'">'+it.length+'</span>';
      h+='</div>';
      if (k === 'DiagnosisCriteria') {
        h+='<div class="ex-drill-list">';
        it.forEach(function(e) {
          h+='<div class="ex-drill-item">';
          h+='<span class="ex-tag" onclick="showEntityDetail(\''+code+'\',\''+k+'\',\''+escAttr(e.code||e.name)+'\')">'+cleanName(e)+'</span>';
          if (e.sub_component && e.sub_component.length) {
            h+='<div class="ex-sub-toggle" onclick="toggleSubList(this)">▸ 明细组件（'+e.sub_component.length+'）</div>';
            h+='<div class="ex-sub-list">';
            e.sub_component.forEach(function(sc) {
              h+='<div class="ex-sub-item">'+cleanName(sc)+'</div>';
            });
            h+='</div>';
          }
          h+='</div>';
        });
        h+='</div>';
      } else if (k === 'DifferentialDiagnosis') {
        h+='<div class="ex-drill-list">';
        it.forEach(function(e) {
          h+='<div class="ex-drill-item">';
          h+='<span class="ex-tag" onclick="showEntityDetail(\''+code+'\',\''+k+'\',\''+escAttr(e.code||e.name)+'\')">'+cleanName(e)+'</span>';
          var _hasDrill=(e.differential_points&&e.differential_points.length)||(e.exclusion_exams&&e.exclusion_exams.length)||(e.blocked_actions&&e.blocked_actions.length);
          if (_hasDrill) {
            h+='<div class="ex-sub-toggle" onclick="toggleSubList(this)">▸ 鉴别详情</div>';
            h+='<div class="ex-sub-list">';
            if (e.differential_points && e.differential_points.length) {
              e.differential_points.forEach(function(dp) {
                h+='<div class="ex-sub-item"><span class="ex-diff-label">鉴别要点</span>'+cleanName(dp)+'</div>';
              });
            }
            if (e.exclusion_exams && e.exclusion_exams.length) {
              h+='<div class="ex-sub-item"><span class="ex-diff-label">排除检查</span>'+e.exclusion_exams.map(function(x){return cleanName(x)}).join('、')+'</div>';
            }
            if (e.blocked_actions && e.blocked_actions.length) {

function renderRecommendationCards(code) {
  var container = document.getElementById('rec-cards-container');
  if (!container) return;
  fetch('/api/kg/disease/' + encodeURIComponent(code) + '/recommendations?v=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(recs) {
      if (!recs || !recs.length) {
        container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px">暂无推荐卡片数据</div>';
        return;
      }
      var h = '<div class="ex-rec-grid">';
      recs.forEach(function(rec) {
        var typeCls = rec.recommendation_type === 'block' ? 'block' : 'recommend';
        var typeLabel = rec.recommendation_type === 'block' ? '阻断' : '推荐';
        h += '<div class="ex-rec-card" onclick="showRecommendationDetail(\'' + escAttr(rec.code) + '\')">';
        h += '<div class="ex-rec-card-head">';
        h += '<span class="ex-rec-card-title">' + cleanName(rec) + '</span>';
        h += '<span class="ex-rec-card-type ' + typeCls + '">' + typeLabel + '</span>';
        h += '</div>';
        // 元信息
        h += '<div class="ex-rec-card-meta">';
        if (rec.stage_name) h += '<span>📋 ' + rec.stage_name + '</span>';
        if (rec.rule_name) h += '<span>⚙️ ' + rec.rule_name + '</span>';
        if (rec.recommendation_class && rec.recommendation_class !== '未结构化')
          h += '<span>📊 ' + rec.recommendation_class + '</span>';
        if (rec.evidence_level && rec.evidence_level !== '未结构化')
          h += '<span>📈 ' + rec.evidence_level + '</span>';
        h += '</div>';
        // 推荐动作
        if (rec.action_name) {
          h += '<div class="ex-rec-card-action">→ ' + rec.action_name;
          if (rec.action_entity_type) h += ' <span style="font-weight:400;color:var(--muted);font-size:10px">(' + rec.action_entity_type + ')</span>';
          h += '</div>';
        }
        // 证据摘要
        if (rec.primary_guideline_name) {
          h += '<div class="ex-rec-card-ev">';
          h += '<span class="ev-guide">📖 ' + rec.primary_guideline_name + '</span>';
          h += '</div>';
        }
        // 推荐陈述
        if (rec.statement_text) {
          h += '<div class="ex-rec-card-stmt">' + rec.statement_text + '</div>';
        }
        h += '</div>';
      });
      h += '</div>';
      container.innerHTML = h;
    })
    .catch(function() {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px">加载推荐卡片失败</div>';
    });
}

function drawGraph(code){
  var el=document.getElementById('explore-graph');
  if(!el) return;
  if(GRAPH){try{GRAPH.dispose();}catch(e){}GRAPH=null;}
  el.innerHTML=''; el.removeAttribute('_echarts_instance_');
  GRAPH=echarts.init(el);

  var d=KG_DATA.diseases[code];
  var seen={};
  var nodes=[{name:d.info.name, symbolSize:70, itemStyle:{color:'#4f8cff',shadowBlur:24,shadowColor:'rgba(79,140,255,.65)'}, label:{fontSize:14,fontWeight:'bold',color:'#fff'}}];
  seen[d.info.name]=1;
  var links=[];
  var cGroups=[
    {name:'临床表现',dims:['Symptom','Sign'],color:'#51cf66'},
    {name:'诊断检查',dims:['Exam','LabTest'],color:'#22b8cf'},
    {name:'治疗方案',dims:['TreatmentPlan','Medication','Procedure'],color:'#ff922b'},
    {name:'预后随访',dims:['Prognosis','FollowUp','Complication'],color:'#cc5de8'},
    {name:'病因机制',dims:['Etiology','Pathophysiology','Epidemiology'],color:'#748ffc'},
    {name:'风险诊断',dims:['RiskFactor','RiskStratification','DiagnosisCriteria','DifferentialDiagnosis'],color:'#ffd43b'},
    {name:'证据指南',dims:['Evidence','Guideline','ThresholdRule','ExamIndicator'],color:'#40c057'}
  ];
  cGroups.forEach(function(grp){
    var total=grp.dims.reduce(function(s,k){return s+(d.dimensions[k]||[]).length;},0);
    if(!total) return;
    if(!seen[grp.name]){nodes.push({name:grp.name, symbolSize:40, itemStyle:{color:grp.color,opacity:.85}, label:{fontSize:11,fontWeight:'bold',color:'#fff'}});seen[grp.name]=1;}
    links.push({source:d.info.name, target:grp.name, lineStyle:{color:grp.color,width:2.5,opacity:.6}});
    grp.dims.forEach(function(k){
      var it=d.dimensions[k]||[];
      if(!it.length) return;
      var dn=DIM_NAMES[k];
      if(!seen[dn]){nodes.push({name:dn, symbolSize:Math.min(16+it.length,36), itemStyle:{color:grp.color+'bb'}, label:{fontSize:9,fontWeight:'bold',color:'#e8eaf0'}});seen[dn]=1;}
      links.push({source:grp.name, target:dn, lineStyle:{color:grp.color+'88',width:1.5,opacity:.5}});
      it.slice(0,5).forEach(function(e){
        var eName=cleanName(e);
        if(!seen[eName]){nodes.push({name:eName, symbolSize:11, itemStyle:{color:grp.color+'99'}, label:{fontSize:8,color:'#b0b8c8'}});seen[eName]=1;}
        links.push({source:dn, target:eName, lineStyle:{color:grp.color+'55',width:1,opacity:.4}});
        // DiagnosisCriteria 二跳：sub_component
        if(k==='DiagnosisCriteria' && e.sub_component && e.sub_component.length){
          e.sub_component.slice(0,8).forEach(function(sc){
            var scName=cleanName(sc);
            if(!seen[scName]){nodes.push({name:scName, symbolSize:9, itemStyle:{color:'#ffd43b77'}, label:{fontSize:7,color:'#b0b8c8'}});seen[scName]=1;}
            links.push({source:eName, target:scName, lineStyle:{color:'#ffd43b44',width:1,opacity:.3}});
          });
        }
        // DifferentialDiagnosis 二跳：differential_points / exclusion_exams
        if(k==='DifferentialDiagnosis'){
          (e.differential_points||[]).slice(0,3).forEach(function(dp){
            var dn2='[鉴别]'+cleanName(dp);
            if(!seen[dn2]){nodes.push({name:dn2, symbolSize:9, itemStyle:{color:'#ffd43b66'}, label:{fontSize:7,color:'#b0b8c8'}});seen[dn2]=1;}
            links.push({source:eName, target:dn2, lineStyle:{color:'#ffd43b33',width:1,opacity:.3}});
          });
          (e.exclusion_exams||[]).slice(0,3).forEach(function(ex){
            var dn2='[排除]'+cleanName(ex);
            if(!seen[dn2]){nodes.push({name:dn2, symbolSize:9, itemStyle:{color:'#ffd43b66'}, label:{fontSize:7,color:'#b0b8c8'}});seen[dn2]=1;}
            links.push({source:eName, target:dn2, lineStyle:{color:'#ffd43b33',width:1,opacity:.3}});
          });
        }
      });
    });
  });
  // ClinicalPathway 路径分组
  if(d.pathways && d.pathways.length){
    var pwColor='#339af0';
    d.pathways.forEach(function(pw){
      var pwName=cleanName(pw)||'临床路径';
      if(!seen[pwName]){nodes.push({name:pwName, symbolSize:36, itemStyle:{color:pwColor,opacity:.85}, label:{fontSize:10,fontWeight:'bold',color:'#fff'}});seen[pwName]=1;}
      links.push({source:d.info.name, target:pwName, lineStyle:{color:pwColor,width:2,opacity:.6}});
      (pw.stages||[]).forEach(function(stg,i){
        var stgName=cleanName(stg)||('阶段'+(i+1));
        if(!seen[stgName]){nodes.push({name:stgName, symbolSize:18, itemStyle:{color:pwColor+'bb'}, label:{fontSize:9,color:'#e8eaf0'}});seen[stgName]=1;}
        links.push({source:pwName, target:stgName, lineStyle:{color:pwColor+'88',width:1.5,opacity:.5}});
      });
    });
  }
  GRAPH.setOption({tooltip:{show:true},series:[{type:'graph',layout:'force',data:nodes,links:links,roam:true,label:{show:true,fontSize:9,color:'#e8eaf0'},force:{repulsion:200,gravity:.08,edgeLength:[50,160],friction:.6}}]});
  // 点击节点展开关联内容
  GRAPH.on('click',function(p){
    if(p.dataType==='node'){
      var name=p.data.name;
      // 查找分组节点，展开该组下所有维度的全部实体
      var grp=cGroups.find(function(g){return g.name===name;});
      if(grp){
        grp.dims.forEach(function(k){
          var it=d.dimensions[k]||[];
          it.forEach(function(e){
            var eName=cleanName(e);
            if(!seen[eName]){
              nodes.push({name:eName,symbolSize:13,itemStyle:{color:grp.color+'cc'},label:{fontSize:7,color:'#b0b8c8'}});
              seen[eName]=1;
              links.push({source:name,target:eName,lineStyle:{color:grp.color+'44',width:1,opacity:.3}});
            }
          });
        });
        GRAPH.setOption({series:[{data:nodes,links:links}]});
      }
      // 查找维度节点，展开该维度所有实体
      else{
        var dimKey=Object.keys(DIM_NAMES).find(function(k){return DIM_NAMES[k]===name;});
        if(dimKey && d.dimensions[dimKey]){
          var grpColor=cGroups.find(function(g){return g.dims.indexOf(dimKey)!==-1;})?.color||'#ff922b';
          d.dimensions[dimKey].forEach(function(e){
            var eName=cleanName(e);
            if(!seen[eName]){
              nodes.push({name:eName,symbolSize:13,itemStyle:{color:grpColor+'cc'},label:{fontSize:7,color:'#b0b8c8'}});
              seen[eName]=1;
              links.push({source:name,target:eName,lineStyle:{color:grpColor+'44',width:1,opacity:.3}});
            }
          });
          GRAPH.setOption({series:[{data:nodes,links:links}]});
        }
      }
    }
  });
}

    h+='<div class="ex-row"><div class="ex-row-label">'+r[0]+'</div><div class="ex-row-value">'+r[1]+'</div></div>';
  });
  var rs=(d.relations_summary||[]).filter(function(r){return r.name===en.name});
  if(rs.length){
    h+='<div class="ex-side-section"><h4>关联关系</h4>';
    rs.forEach(function(r){h+='<div class="ex-small-item">'+r.rel+' → '+r.name+'</div>';});
    h+='</div>';
  }
  // DiagnosisCriteria: 展示 sub_component 诊断明细（证据绑定到推荐动作）
  if(k==='DiagnosisCriteria'){
    var subs=en.sub_component||[];
    if(subs.length){
      h+='<div class="ex-side-section"><h4>诊断明细（'+subs.length+'）</h4>';
      subs.forEach(function(sc,idx){
        h+='<div class="ex-sub-detail">';
        h+='<div class="ex-sub-detail-title"><span class="idx">'+(idx+1)+'</span>'+cleanName(sc)+'</div>';
        if(sc.rule_logic) h+='<div class="ex-sub-detail-row"><b>规则说明：</b>'+sc.rule_logic+'</div>';
        if(sc.actions&&sc.actions.length){
          h+='<div class="ex-sub-detail-row"><b>推荐动作：</b></div>';
          sc.actions.forEach(function(a){
            h+='<div class="ex-evidence-item"><b>'+cleanName(a)+'</b></div>';
            // 绑定该动作的证据（从组件级证据中展示）
            if(sc.evidence&&sc.evidence.length){
              sc.evidence.forEach(function(ev){
                var src=ev.source_file?(ev.source_file+(ev.source_page?' p.'+ev.source_page:'')):'';
                var evMeta=[];
                if(ev.recommendation_class)evMeta.push('推荐等级:'+ev.recommendation_class);
                if(ev.evidence_level)evMeta.push('证据等级:'+ev.evidence_level);
                h+='<div class="ex-evidence-item" style="padding-left:24px;font-size:11px;color:var(--muted)">';
                h+='  '+(ev.name||ev.code);
                if(src)h+=' <span class="src">['+src+']</span>';
                if(evMeta.length)h+=' <span class="src">('+evMeta.join(', ')+')</span>';
                h+='</div>';
              });
            }
          });
        }
        h+='</div>';
      });
      h+='</div>';
    }
  }
  // DifferentialDiagnosis: 展示鉴别详情
  if(k==='DifferentialDiagnosis'){
    if(en.differential_points&&en.differential_points.length){
      h+='<div class="ex-side-section"><h4>鉴别要点（'+en.differential_points.length+'）</h4>';
      en.differential_points.forEach(function(dp){h+='<div class="ex-small-item">'+cleanName(dp)+'</div>';});
      h+='</div>';
    }
    if(en.exclusion_exams&&en.exclusion_exams.length){
      h+='<div class="ex-side-section"><h4>排除检查（'+en.exclusion_exams.length+'）</h4>';
      en.exclusion_exams.forEach(function(ex){h+='<div class="ex-small-item">'+cleanName(ex)+'</div>';});
      h+='</div>';
    }
    if(en.blocked_actions&&en.blocked_actions.length){
      h+='<div class="ex-side-section"><h4>阻断动作（'+en.blocked_actions.length+'）</h4>';
      en.blocked_actions.forEach(function(ba){h+='<div class="ex-small-item">'+cleanName(ba)+'</div>';});
      h+='</div>';
    }
  }
  // V1.11 教材骨架字段
  var hasSkeleton = en.skeleton_slot || en.knowledge_layer || en.source_type || en.source_section_path;
  if (hasSkeleton) {
    h+='<div class="ex-side-section"><h4>教材骨架信息</h4>';
    if (en.source_type) h+='<div class="ex-row"><div class="ex-row-label">来源类型</div><div class="ex-row-value">'+sourceTypeName(en.source_type)+'</div></div>';
    if (en.knowledge_layer) h+='<div class="ex-row"><div class="ex-row-label">知识层级</div><div class="ex-row-value">'+knowledgeLayerName(en.knowledge_layer)+'</div></div>';
    if (en.skeleton_slot) h+='<div class="ex-row"><div class="ex-row-label">骨架槽位</div><div class="ex-row-value">'+skeletonSlotName(en.skeleton_slot)+'</div></div>';
    if (en.source_section_path) h+='<div class="ex-row"><div class="ex-row-label">章节路径</div><div class="ex-row-value" style="font-size:11px;line-height:1.4">'+en.source_section_path+'</div></div>';
    var pageInfo='';
    if (en.pdf_page_start) pageInfo+='PDF: '+en.pdf_page_start+(en.pdf_page_end?'-'+en.pdf_page_end:'')+'页';
    if (en.book_page_start) pageInfo+=(pageInfo?' | ':'')+'书内: '+en.book_page_start+(en.book_page_end?'-'+en.book_page_end:'')+'页';
    if (pageInfo) h+='<div class="ex-row"><div class="ex-row-label">页码</div><div class="ex-row-value">'+pageInfo+'</div></div>';
    if (en.text_anchor) h+='<div class="ex-row"><div class="ex-row-label">文本锚点</div><div class="ex-row-value" style="font-size:11px;color:var(--muted)">'+en.text_anchor+'</div></div>';
    h+='</div>';
  }
  h+='<div class="ex-side-section"><h4>同维度其他实体</h4>';
  it.slice(0,20).forEach(function(e){if(e.name!==en.name)h+='<div class="ex-small-item">'+cleanName(e)+'</div>';});
  h+='</div>';
  // 异步加载实体元数据（别名、跨疾病关联）
  if(en.code){
    h+='<div id="entity-api-detail" class="ex-side-section"><div class="ex-api-loading">加载实体元数据...</div></div>';
  }
  panel.innerHTML=h;
  // 调用 /api/kg/entity/<code> 获取额外详情
  if(en.code){
    fetch('/api/kg/entity/'+encodeURIComponent(en.code)).then(function(r){return r.json()}).then(function(data){
      if(data.error)return;
      var apiH='<h4>实体元数据</h4>';
      if(data.name_en)apiH+='<div class="ex-row"><div class="ex-row-label">英文名</div><div class="ex-row-value">'+data.name_en+'</div></div>';
      if(data.aliases&&data.aliases.length)apiH+='<div class="ex-row"><div class="ex-row-label">别名</div><div class="ex-row-value">'+data.aliases.join('、')+'</div></div>';
      if(data.diseases&&data.diseases.length){
        apiH+='<div class="ex-small-item" style="margin-top:6px"><b>关联疾病（'+data.diseases.length+'）：</b></div>';
        data.diseases.forEach(function(d2){apiH+='<div class="ex-small-item">'+d2.disease_name+' <span style="color:var(--muted);font-size:10px">'+d2.rel_type+'</span></div>';});
      }
      var el=document.getElementById('entity-api-detail');
      if(el)el.innerHTML=apiH;
    }).catch(function(){var el=document.getElementById('entity-api-detail');if(el)el.style.display='none';});
  }
}
</script>
</body>
</html>
